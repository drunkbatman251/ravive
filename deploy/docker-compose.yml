version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: ravive_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ravive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ravive_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ../apps/backend
    container_name: ravive_api
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ravive
      JWT_SECRET: change-this-in-production
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: ""
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_CALLBACK_URL: ""
      FRONTEND_URL: "*"
    depends_on:
      - db
    ports:
      - "4000:4000"

volumes:
  ravive_pgdata:
